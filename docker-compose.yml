version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: runlog-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - runlog-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: runlog-redis
    volumes:
      - redis-data:/data
    networks:
      - runlog-net
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: runlog-server
    ports:
      - '5005:5005'
    environment:
      PORT: 5005
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/runlog
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-${JWT_SECRET}}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
    depends_on:
      - mongodb
      - redis
    networks:
      - runlog-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: runlog-client
    ports:
      - '8080:80'
    depends_on:
      - server
    networks:
      - runlog-net
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:

networks:
  runlog-net:
    driver: bridge
