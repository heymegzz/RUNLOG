version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: runlog-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - runlog-net

  redis:
    image: redis:alpine
    container_name: runlog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - runlog-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: runlog-server
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGODB_URI=mongodb://mongodb:27017/runlog
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_runlog_key_in_production
      # - EMAIL_HOST=smtp.gmail.com
      # - EMAIL_PORT=587
      # - EMAIL_USER=your_email@gmail.com
      # - EMAIL_PASS=your_app_password
    depends_on:
      - mongodb
      - redis
    networks:
      - runlog-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: runlog-client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - runlog-net

volumes:
  mongo-data:
  redis-data:

networks:
  runlog-net:
    driver: bridge
